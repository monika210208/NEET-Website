<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEET Prep Analyzer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>🧠 NEET Prep Analyzer</h1>
</header>

<nav>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('analysis')">Analysis</button>
<button onclick="show('pyq')">PYQs</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="toggleDark()">🌙</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>📊 Dashboard</h2>

<div class="cards">
<div>🧬 Biology<br><b>50%</b></div>
<div>⚗️ Chemistry<br><b>25%</b></div>
<div>⚡ Physics<br><b>25%</b></div>
</div>

<p class="info">
✔ Biology is scoring<br>
✔ Physics is toughest<br>
✔ Chemistry is moderate
</p>
</section>

<!-- ANALYSIS -->
<section id="analysis" class="hidden">
<h2>📈 Trend Analysis</h2>
<canvas id="chart"></canvas>
</section>

<!-- PYQ -->
<section id="pyq" class="hidden">
<h2>📚 Practice PYQs</h2>

<select id="subject">
<option>Biology</option>
<option>Physics</option>
<option>Chemistry</option>
</select>

<button onclick="loadPYQ()">Load Questions</button>

<div id="questions"></div>
</section>

<!-- QUIZ -->
<section id="quiz" class="hidden">
<h2>🧠 Quiz</h2>
<p id="q"></p>
<div id="opts"></div>
<p id="score"></p>
</section>

<script src="script.js"></script>
</body>
</html>
